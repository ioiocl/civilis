services:
  minio:
    image: minio/minio
    container_name: obratrack-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  backend:
    build: ./backend
    container_name: obratrack-backend
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - minio
    environment:
      PORT: 3000
      DATABASE_URL: postgresql://postgres:postgres1@host.docker.internal:5432/obratrack?schema=public
      JWT_SECRET: supersecret
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: obratrack-evidence
      MINIO_USE_SSL: "false"
      SOLANA_NETWORK: enabled
      SOLANA_RPC_URL: https://api.devnet.solana.com
      SOLANA_PRIVATE_KEY: "[]"
      SOLANA_PRIVATE_KEY_BASE58: "6qAAAD7UcA37nDyyJWbzZ34CkjoRc2U7f1GftcCsnudnBpH9GVN1KJccFLYncSqJE4cFyKW4yfGp5Lx97tztFzd"
      SOLANA_COMMITMENT: confirmed
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build: ./frontend
    container_name: obratrack-frontend
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://45.7.230.104:3000
    ports:
      - "8080:8080"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public

volumes:
  minio_data:
